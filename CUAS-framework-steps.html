  <script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>The Framework — Steps<\u002Ftitle>\n<style>\n@font-face{font-family:\"Almoni\";src:url(\"https://nernst01.github.io/tactien-website-embeds/fonts/Almoni-UltraBold.ttf\") format(\"truetype\");font-weight:800 900;font-style:normal;font-display:swap;}\n@font-face{font-family:\"Roboto\";src:url(\"https://nernst01.github.io/tactien-website-embeds/fonts/Roboto-Variable.ttf\") format(\"truetype-variations\");font-weight:100 900;font-stretch:75% 125%;font-style:normal;font-display:swap;}\n*{box-sizing:border-box}\nbody{margin:0;font-family:'Roboto',Helvetica,Arial,sans-serif;}\na{color:#C8975A;}\na:hover{color:#F0EFED;}\n.ttg-steps{display:grid;grid-template-columns:repeat(6,1fr);}\n.ttg-step-btn{background:none;border:none;cursor:pointer;text-align:left;padding:18px 14px 18px 0;margin-top:-1px;font-family:inherit;}\n@media(max-width:800px){#stepTabs{display:none !important;}#stepTabs + div{background:none !important;border:none !important;padding:0 !important;min-height:0 !important;}.ttg-step-panel{display:flex !important;flex-direction:column !important;align-items:flex-start !important;gap:12px !important;background:#141210 !important;border:1px solid #2B2B2B !important;border-radius:4px !important;padding:20px !important;margin-bottom:14px !important;}.ttg-step-panel h3{font-size:15px !important;white-space:nowrap !important;overflow:hidden !important;text-overflow:ellipsis !important;max-width:100% !important;}.ttg-step-panel img{width:56px !important;height:56px !important;}section > div{padding:40px 16px !important;}}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<section style=\"background:#1A1A1A;\">\n  <div style=\"max-width:1200px;margin:0 auto;padding:64px 24px;\">\n\n    <div class=\"ttg-steps\" id=\"stepTabs\" style=\"margin-top:0;border-top:1px solid #2B2B2B;\">\n      <button class=\"ttg-step-btn\" data-step=\"0\" style=\"border-top:2px solid #C8975A;\">\n        <div style=\"font-family:'Almoni','Arial Black',sans-serif;font-weight:900;font-size:30px;color:#C8975A;line-height:1;\">01<\u002Fdiv>\n        <div style=\"color:#F0EFED;font-size:14px;font-weight:600;margin-top:10px;\">Educate &amp; Inform<\u002Fdiv>\n      <\u002Fbutton>\n      <button class=\"ttg-step-btn\" data-step=\"1\" style=\"border-top:2px solid transparent;\">\n        <div style=\"font-family:'Almoni','Arial Black',sans-serif;font-weight:900;font-size:30px;color:#8f8f8f;line-height:1;\">02<\u002Fdiv>\n        <div style=\"color:#F0EFED;font-size:14px;font-weight:600;margin-top:10px;\">Define Requirements<\u002Fdiv>\n      <\u002Fbutton>\n      <button class=\"ttg-step-btn\" data-step=\"2\" style=\"border-top:2px solid transparent;\">\n        <div style=\"font-family:'Almoni','Arial Black',sans-serif;font-weight:900;font-size:30px;color:#8f8f8f;line-height:1;\">03<\u002Fdiv>\n        <div style=\"color:#F0EFED;font-size:14px;font-weight:600;margin-top:10px;\">Industry RFP<\u002Fdiv>\n      <\u002Fbutton>\n      <button class=\"ttg-step-btn\" data-step=\"3\" style=\"border-top:2px solid transparent;\">\n        <div style=\"font-family:'Almoni','Arial Black',sans-serif;font-weight:900;font-size:30px;color:#8f8f8f;line-height:1;\">04<\u002Fdiv>\n        <div style=\"color:#F0EFED;font-size:14px;font-weight:600;margin-top:10px;\">Vetting &amp; Validation<\u002Fdiv>\n      <\u002Fbutton>\n      <button class=\"ttg-step-btn\" data-step=\"4\" style=\"border-top:2px solid transparent;\">\n        <div style=\"font-family:'Almoni','Arial Black',sans-serif;font-weight:900;font-size:30px;color:#8f8f8f;line-height:1;\">05<\u002Fdiv>\n        <div style=\"color:#F0EFED;font-size:14px;font-weight:600;margin-top:10px;\">Final Report<\u002Fdiv>\n      <\u002Fbutton>\n      <button class=\"ttg-step-btn\" data-step=\"5\" style=\"border-top:2px solid transparent;\">\n        <div style=\"font-family:'Almoni','Arial Black',sans-serif;font-weight:900;font-size:30px;color:#8f8f8f;line-height:1;\">06<\u002Fdiv>\n        <div style=\"color:#F0EFED;font-size:14px;font-weight:600;margin-top:10px;\">Commissioning<\u002Fdiv>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"background:#141210;border:1px solid #2B2B2B;border-radius:4px;padding:28px 30px;margin-top:4px;min-height:150px;\">\n      <div class=\"ttg-step-panel\" data-panel=\"0\" style=\"display:flex;align-items:center;gap:30px;\">\n        <div style=\"flex:1;min-width:0;\">\n          <div style=\"font-family:'JetBrains Mono',Menlo,monospace;font-size:11px;letter-spacing:.14em;color:#C8975A;\">STEP 01<\u002Fdiv>\n          <h3 style=\"font-family:'Almoni','Arial Black',sans-serif;font-weight:900;color:#F0EFED;font-size:22px;text-transform:uppercase;margin:8px 0 12px;\">Educate &amp; Inform<\u002Fh3>\n          <p style=\"color:#A8A8A8;font-size:15px;line-height:1.6;max-width:820px;margin:0;\">We brief you on the state of the CUAS industry: detection technology types (RF, radar, optical, acoustic, multi-sensor fusion), the current regulatory framework, operational constraints like jamming restrictions and safety exclusion zones, and the real cost spectrum, from $5,000 sensors to $2,000,000+ integrated platforms.<\u002Fp>\n        <\u002Fdiv>\n        <img src=\"950f45a9-f29c-48d6-ba54-ed3dbca3b2f4\" alt=\"\" style=\"width:110px;height:110px;object-fit:contain;flex:none;\">\n      <\u002Fdiv>\n\n      <div class=\"ttg-step-panel\" data-panel=\"1\" style=\"display:none;align-items:center;gap:30px;\">\n        <div style=\"flex:1;min-width:0;\">\n          <div style=\"font-family:'JetBrains Mono',Menlo,monospace;font-size:11px;letter-spacing:.14em;color:#C8975A;\">STEP 02<\u002Fdiv>\n          <h3 style=\"font-family:'Almoni','Arial Black',sans-serif;font-weight:900;color:#F0EFED;font-size:22px;text-transform:uppercase;margin:8px 0 12px;\">Define Requirements<\u002Fh3>\n          <p style=\"color:#A8A8A8;font-size:15px;line-height:1.6;max-width:820px;margin:0;\">We work with your org to identify critical assets, threat vectors, and the operational performance criteria that matter for your sites: detection range, latency, false-positive tolerance, and integration with your existing security platforms.<\u002Fp>\n        <\u002Fdiv>\n        <img src=\"47d19baf-5cbd-4f89-89e0-8289f742dc17\" alt=\"\" style=\"width:110px;height:110px;object-fit:contain;flex:none;\">\n      <\u002Fdiv>\n\n      <div class=\"ttg-step-panel\" data-panel=\"2\" style=\"display:none;align-items:center;gap:30px;\">\n        <div style=\"flex:1;min-width:0;\">\n          <div style=\"font-family:'JetBrains Mono',Menlo,monospace;font-size:11px;letter-spacing:.14em;color:#C8975A;\">STEP 03<\u002Fdiv>\n          <h3 style=\"font-family:'Almoni','Arial Black',sans-serif;font-weight:900;color:#F0EFED;font-size:22px;text-transform:uppercase;margin:8px 0 12px;\">Industry RFP<\u002Fh3>\n          <p style=\"color:#A8A8A8;font-size:15px;line-height:1.6;max-width:820px;margin:0;\">We work with your org to build an industry RFP, inviting vendors who make spec to partake in a vetting exercise at your target asset.<\u002Fp>\n        <\u002Fdiv>\n        <img src=\"4ca17001-06ae-476b-9625-23d92017bd4d\" alt=\"\" style=\"width:110px;height:110px;object-fit:contain;flex:none;\">\n      <\u002Fdiv>\n\n      <div class=\"ttg-step-panel\" data-panel=\"3\" style=\"display:none;align-items:center;gap:30px;\">\n        <div style=\"flex:1;min-width:0;\">\n          <div style=\"font-family:'JetBrains Mono',Menlo,monospace;font-size:11px;letter-spacing:.14em;color:#C8975A;\">STEP 04<\u002Fdiv>\n          <h3 style=\"font-family:'Almoni','Arial Black',sans-serif;font-weight:900;color:#F0EFED;font-size:22px;text-transform:uppercase;margin:8px 0 12px;\">Vetting &amp; Validation<\u002Fh3>\n          <p style=\"color:#A8A8A8;font-size:15px;line-height:1.6;max-width:820px;margin:0 0 14px;\">Tactien ingests all vendor tracking data and Tactien UAS flight telemetry from the test, into a purpose-built analysis software for scoring/comparing vendor performance.<\u002Fp>\n          \n        <\u002Fdiv>\n        <img src=\"7a9d8dac-f130-488b-b12e-24fa7c6c8a47\" alt=\"\" style=\"width:110px;height:110px;object-fit:contain;flex:none;\">\n      <\u002Fdiv>\n\n      <div class=\"ttg-step-panel\" data-panel=\"4\" style=\"display:none;align-items:center;gap:30px;\">\n        <div style=\"flex:1;min-width:0;\">\n          <div style=\"font-family:'JetBrains Mono',Menlo,monospace;font-size:11px;letter-spacing:.14em;color:#C8975A;\">STEP 05<\u002Fdiv>\n          <h3 style=\"font-family:'Almoni','Arial Black',sans-serif;font-weight:900;color:#F0EFED;font-size:22px;text-transform:uppercase;margin:8px 0 12px;\">Final Report &amp; Recommendation<\u002Fh3>\n          <p style=\"color:#A8A8A8;font-size:15px;line-height:1.6;max-width:820px;margin:0;\">A single, data-backed vendor recommendation, with vendor scorecards, side-by-side comparative analytics, and a clear accounting of what each system missed and under what conditions.<\u002Fp>\n        <\u002Fdiv>\n        <img src=\"73947a5a-2b1f-449c-a01b-6603cbf0a650\" alt=\"\" style=\"width:110px;height:110px;object-fit:contain;flex:none;\">\n      <\u002Fdiv>\n\n      <div class=\"ttg-step-panel\" data-panel=\"5\" style=\"display:none;align-items:center;gap:30px;\">\n        <div style=\"flex:1;min-width:0;\">\n          <div style=\"font-family:'JetBrains Mono',Menlo,monospace;font-size:11px;letter-spacing:.14em;color:#C8975A;\">STEP 06<\u002Fdiv>\n          <h3 style=\"font-family:'Almoni','Arial Black',sans-serif;font-weight:900;color:#F0EFED;font-size:22px;text-transform:uppercase;margin:8px 0 12px;\">Commissioning<\u002Fh3>\n          <p style=\"color:#A8A8A8;font-size:15px;line-height:1.6;max-width:820px;margin:0;\">Strategic rollout across your asset footprint, sensor layering by site risk profile, and ongoing re-validation as the threat environment or your assets change.<\u002Fp>\n        <\u002Fdiv>\n        <img src=\"2d5fd882-cb0c-4d2e-ae53-3cb29f7a99ef\" alt=\"\" style=\"width:110px;height:110px;object-fit:contain;flex:none;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"color:#727272;font-size:13px;line-height:1.5;margin:18px 0 0;\">Not every engagement needs all six steps. Some clients enter at step 4 with vendors already shortlisted. Scope this with an advisor.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<script>\n(function(){\n  var tabs = document.querySelectorAll('#stepTabs .ttg-step-btn');\n  var panels = document.querySelectorAll('.ttg-step-panel');\n  tabs.forEach(function(btn){\n    btn.addEventListener('click', function(){\n      var idx = btn.getAttribute('data-step');\n      tabs.forEach(function(b){\n        var active = b === btn;\n        b.style.borderTopColor = active ? '#C8975A' : 'transparent';\n        b.querySelector('div').style.color = active ? '#C8975A' : '#8f8f8f';\n      });\n      panels.forEach(function(p){\n        p.style.display = (p.getAttribute('data-panel') === idx) ? 'flex' : 'none';\n      });\n    });\n  });\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
